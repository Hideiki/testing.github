<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Constructors & Classes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        h1 { color: #2c3e50; }
        h2 { color: #3498db; }
        button {
            padding: 10px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        .output {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-line;
            border: 2px solid #3498db;
            min-height: 200px;
        }
        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🏭 Constructors & Classes</h1>
    
    <div class="note">
        <strong>📌 Constructor:</strong> Old way, function-based blueprint<br>
        <strong>📌 Class:</strong> New way, cleaner syntax (does same thing)
    </div>

    <button onclick="testBookConstructor()">1. Book Constructor</button>
    <button onclick="testMovieConstructor()">2. Movie Constructor + Method</button>
    <button onclick="testStudentClass()">3. Convert to Class</button>
    <button onclick="testCalculatorClass()">4. Calculator Class</button>
    <button onclick="testBankAccount()">5. Bank Account</button>
    <button onclick="testProductClass()">6. Product with Discount</button>
    <button onclick="testDogClass()">7. Dog Class</button>
    <button onclick="testPlaylistClass()">8. Playlist Class</button>
    <button onclick="testRectangleClass()">9. Rectangle Class</button>
    <button onclick="testGradeTracker()">10. Grade Tracker</button>
    <button onclick="testTodoList()">🎁 Bonus: Todo List</button>

    <div class="output" id="output">
        ► Click a button to test...
    </div>

    <script src="con and class.js">
        
    </script>
</body>
</html>
