<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App - Project</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class  ="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" id="clear" onclick="clearDisplay()">C</button>
            <button class="operator" id="backspace" onclick="backspace()">⌫</button>
            <button class="operator" id="percent" onclick="percent()">%</button>
            <button class="operator" id="divide" onclick="updateDisplay('÷')">÷</button>

            <button onclick="updateDisplay('7')">7</button>
            <button onclick="updateDisplay('8')">8</button>
            <button onclick="updateDisplay('9')">9</button>
            <button class="operator" id="multiply" onclick="updateDisplay('x')">x</button>

            <button onclick="updateDisplay('4')">4</button>
            <button onclick="updateDisplay('5')">5</button>
            <button onclick="updateDisplay('6')">6</button>
            <button class="operator" id="substract" onclick="updateDisplay('-')">-</button>

            <button onclick="updateDisplay('1')">1</button>
            <button onclick="updateDisplay('2')">2</button>
            <button onclick="updateDisplay('3')">3</button>
            <button class="operator" id="addition" onclick="updateDisplay('+')">+</button>

            <button id="0" class="zero" onclick="updateDisplay('0')">0</button>
            <button id="decimal" onclick="updateDisplay('.')">.</button>
            <button id="equals" class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="calculator.js">
    </script>
</body>
</html>
