<!DOCTYPE html>
<html>
<head>
    <title>Beginner Nested Loops</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        h1 { color: #2c3e50; }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        .output {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-line;
            border: 2px solid #3498db;
        }
    </style>
</head>
<body>
    <h1>🔄 Beginner Nested Loops</h1>
    
    <button onclick="daysAndHours()">1. Days and Hours</button>
    <button onclick="starBox()">2. Star Box</button>
    <button onclick="countingChart()">3. Counting Chart</button>
    <button onclick="smallTimesTable()">4. Small Times Table</button>
    <button onclick="numberTriangle()">5. Number Triangle</button>
    <button onclick="reverseTriangle()">6. Reverse Triangle</button>
    <button onclick="simpleGrid()">7. Simple Grid</button>
    <button onclick="timesTableWithHeaders()">8. Times Table with Headers</button>
    <button onclick="starPatterns()">9. Star Patterns</button>
    <button onclick="clockWithAmPm()">10. Clock with AM/PM</button>

    <div class="output" id="output">
        ► Click a button to see nested loops in action...
    </div>

    <script src="nested-loop.js">

    </script>
</body>
</html>
