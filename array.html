<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Arrays - Beginner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 10px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        .output {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-line;
            border: 2px solid #3498db;
        }
    </style>
</head>
<body>
    <h1>📚 JavaScript Arrays - Beginner</h1>
    
    <button onclick="createMyArray()">1. Create My Array</button>
    <button onclick="accessColors()">2. Access Items</button>
    <button onclick="loopAnimals()">3. Loop Through Array</button>
    <button onclick="addNumbers()">4. Add Items (push)</button>
    <button onclick="removeLetters()">5. Remove Items (pop, shift)</button>
    <button onclick="addToFront()">6. Add to Front (unshift)</button>
    <button onclick="findFruit()">7. Find Index (indexOf)</button>
    <button onclick="checkGame()">8. Check Exists (includes)</button>
    <button onclick="combineArrays()">9. Combine Arrays (concat)</button>
    <button onclick="sliceArray()">10. Slice Array</button>
    <button onclick="shoppingListGame()">🎁 Bonus: Shopping List</button>

    <div class="output" id="output">
        ► Click a button to test arrays...
    </div>

    <script src="array.js">

    </script>
</body>
</html>
