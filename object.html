<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Objects - Beginner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f0f4f8;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 10px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background: #2980b9; }
        .output {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-line;
            border: 2px solid #3498db;
        }
    </style>
</head>
<body>
    <h1>📦 JavaScript Objects - Beginner</h1>
    
    <button onclick="createMyObject()">1. Create My Object</button>
    <button onclick="accessCarProperties()">2. Access Properties</button>
    <button onclick="addBookProperties()">3. Add Properties</button>
    <button onclick="updateStudent()">4. Update Properties</button>
    <button onclick="createMovieObject()">5. Mixed Data Types</button>
    <button onclick="loopThroughPhone()">6. Loop Through Object</button>
    <button onclick="createDogObject()">7. Object with Methods</button>
    <button onclick="compareObjects()">8. Compare Objects</button>
    <button onclick="createMovieList()">9. Array of Objects</button>
    <button onclick="findProduct()">10. Find in Array</button>
    <button onclick="shoppingCartBonus()">🎁 Bonus: Shopping Cart</button>

    <div class="output" id="output">
        ► Click a button to test objects...
    </div>

    <script src="object.js">
    </script>
</body>
</html>
